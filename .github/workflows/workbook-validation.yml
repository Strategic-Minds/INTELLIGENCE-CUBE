name: workbook-validation

on:
  push:
    branches: [workbook-os/scaffold-v1]
  pull_request:
    branches: [main, workbook-os/scaffold-v1]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate manifest
        run: python scripts/workbook_validation/validate_manifest.py
      - name: Validate uploads
        run: python scripts/workbook_validation/validate_workbook_uploads.py
      - name: Validate connector sheets
        run: python scripts/workbook_validation/validate_connector_sheets.py
      - name: Validate workbook schema
        run: python scripts/workbook_validation/validate_workbook_schema.py
      - name: Scan workbook safety
        run: python scripts/workbook_validation/scan_workbook_for_public_safety.py
      - name: Validate public boundary
        run: python scripts/workbook_validation/validate_public_repo_boundaries.py
